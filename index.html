<!DOCTYPE html>
<html>
<head>
  <title>Roblox Server Finder</title>
</head>
<body style="background:#0f172a;color:white;font-family:sans-serif;">

<h1>🎮 Server Finder</h1>
<button onclick="loadServers()">Load Servers</button>

<div id="servers"></div>

<script>
async function loadServers() {
  const res = await fetch("https://games.roblox.com/v1/games/2317712696/servers/Public?limit=10");
  const data = await res.json();

  const container = document.getElementById("servers");
  container.innerHTML = "";

  data.data.forEach(server => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p>Players: ${server.playing}/${server.maxPlayers}</p>
      <button onclick="join('${server.id}')">Join</button>
      <hr>
    `;

    container.appendChild(div);
  });
}

function join(id) {
  window.location.href = `roblox://placeId=2317712696&gameInstanceId=${id}`;
}
</script>

</body>
</html>
